# ============================================================
# Prometheus Configuration
# ============================================================
#
# Prometheus is a pull-based monitoring system:
#   1. It discovers targets (pods, nodes) via Kubernetes API
#   2. It scrapes /metrics from each target at a fixed interval
#   3. It stores time-series data locally
#   4. Grafana queries Prometheus to render dashboards
#   5. Alertmanager fires alerts when rules are violated
#
# In production on EKS, you'd deploy Prometheus via the
# kube-prometheus-stack Helm chart, which bundles Prometheus,
# Grafana, Alertmanager, and node-exporter. This config shows
# the conceptual setup for portfolio demonstration.
#
# SI-4 (System Monitoring): continuous metric collection
# CA-7 (Continuous Monitoring): real-time dashboard + alerts
# ============================================================

global:
  # How often Prometheus scrapes each target.
  # 15s is standard — frequent enough for alerting,
  # not so frequent that it overwhelms the targets.
  scrape_interval: 15s

  # How often Prometheus evaluates alert rules.
  evaluation_interval: 15s

  # Labels added to every metric — lets you filter by cluster
  # in multi-cluster Grafana setups.
  external_labels:
    cluster: "securegenai-dev"
    environment: "dev"

# ── Alert Rules ──────────────────────────────────────────────
rule_files:
  - "alert_rules.yml"

# ── Alertmanager ─────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

# ── Scrape Configurations ───────────────────────────────────
# Each scrape_config defines a set of targets to monitor.
scrape_configs:

  # ── Prometheus self-monitoring ─────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── SecureGenAI Application ────────────────────────────────
  # Scrapes the /metrics endpoint from our FastAPI pods.
  # In EKS, kubernetes_sd_configs auto-discovers pods by annotation.
  - job_name: "securegenai-app"
    metrics_path: /metrics
    scrape_interval: 15s

    # Kubernetes service discovery — finds pods automatically.
    # When a new pod starts or an old one dies, Prometheus
    # updates its target list without manual configuration.
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - securegenai

    # Relabeling filters which pods to scrape and what labels to apply.
    relabel_configs:
      # Only scrape pods with the annotation prometheus.io/scrape=true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true

      # Use the pod's prometheus.io/path annotation for the metrics path
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)

      # Use the pod's prometheus.io/port annotation for the port
      - source_labels:
          [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__

      # Add pod name as a label
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod

      # Add namespace as a label
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace

  # ── Node Exporter (host-level metrics) ─────────────────────
  # Monitors the EKS worker nodes themselves: CPU, memory,
  # disk, network. Deployed as a DaemonSet (one per node).
  - job_name: "node-exporter"
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: replace
        source_labels: [__meta_kubernetes_node_name]
        target_label: node

  # ── kube-state-metrics (K8s object metrics) ────────────────
  # Tracks Kubernetes object states: deployment replicas,
  # pod phases, node conditions, etc.
  - job_name: "kube-state-metrics"
    static_configs:
      - targets: ["kube-state-metrics:8080"]
