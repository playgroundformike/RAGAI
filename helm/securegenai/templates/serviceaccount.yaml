# ============================================================
# Service Account — IRSA Bridge
# ============================================================
# Compare to the original k8s/serviceaccount.yaml:
#   BEFORE: role-arn hardcoded to a placeholder ACCOUNT_ID
#   AFTER:  role-arn is {{ .Values.serviceAccount.roleArn }}
#           dev gets dev IAM role, prod gets prod IAM role
#
# This is critical because dev and prod IAM roles have
# different resource scopes — dev role can only access
# the dev S3 bucket, prod role can only access prod bucket.
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "securegenai.serviceAccountName" . }}
  namespace: {{ .Values.namespace.name }}
  annotations:
    # IRSA link — tells EKS pod identity webhook to inject
    # IAM role credentials into pods using this service account.
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.roleArn | quote }}
  labels:
    {{- include "securegenai.labels" . | nindent 4 }}
