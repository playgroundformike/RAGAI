# ============================================================
# Service — Stable Network Endpoint
# ============================================================
# Provides a stable DNS name and load-balances traffic across
# all healthy pods. ClusterIP = only reachable inside cluster.
# External traffic comes through an Ingress or ALB.
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ include "securegenai.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "securegenai.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "securegenai.selectorLabels" . | nindent 4 }}
