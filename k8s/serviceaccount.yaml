# ============================================================
# Kubernetes Service Account — IRSA Bridge
# ============================================================
# This service account is the bridge between Kubernetes and AWS IAM.
#
# How IRSA works (the flow):
#   1. Pod starts with this service account
#   2. K8s injects a JWT token into the pod at a known path
#   3. boto3 in the pod detects the token automatically
#   4. boto3 calls AWS STS AssumeRoleWithWebIdentity
#   5. STS validates the token against the EKS OIDC provider
#   6. STS checks that this service account is allowed in the
#      IAM role's trust policy (from our Terraform IAM module)
#   7. STS returns temporary credentials scoped to the IAM role
#   8. boto3 uses those credentials for S3, KMS, Bedrock calls
#
# The app code doesn't know any of this is happening. boto3
# handles it transparently. No AWS credentials in the pod.
#
# AC-6 (Least Privilege): only this specific service account
# in this specific namespace can assume the IAM role.
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: securegenai-app
  namespace: securegenai
  annotations:
    # This annotation is the IRSA link — it tells the EKS pod identity
    # webhook to inject the IAM role credentials into pods using this SA.
    # VALUE: Replace with the output from terraform: module.iam.app_role_arn
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/securegenai-app-role"
  labels:
    app: securegenai
