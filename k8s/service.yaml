# ============================================================
# Kubernetes Service
# ============================================================
# A Service provides a stable network endpoint for the pods.
# Pods are ephemeral — they get new IPs when restarted.
# The Service gives a stable DNS name (securegenai-app.securegenai.svc)
# and load-balances traffic across all healthy pods.
#
# Type ClusterIP = only reachable inside the cluster.
# External traffic comes through an Ingress or ALB (not defined here —
# in production, the ALB Ingress Controller handles this).
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: securegenai-app
  namespace: securegenai
  labels:
    app: securegenai
spec:
  type: ClusterIP
  ports:
    - port: 80            # What other services connect to
      targetPort: 8000    # Where the pod is actually listening
      protocol: TCP
      name: http
  # Route traffic to pods with this label
  selector:
    app: securegenai
