# ============================================================
# Kubernetes Deployment
# ============================================================
# Manages the lifecycle of application pods:
#   - Rolling updates (zero-downtime deploys)
#   - Automatic restart on crash
#   - Scaling (replicas)
#   - Health monitoring via probes
#
# Security hardening in this manifest:
#   - Non-root user (runAsUser: 1001 — matches Dockerfile)
#   - Read-only root filesystem
#   - No privilege escalation
#   - Dropped all Linux capabilities
#   - Resource limits prevent noisy neighbor / DoS
#
# NIST 800-53 Controls:
#   AC-6  (Least Privilege) — non-root, minimal capabilities
#   SC-7  (Boundary Protection) — network policy restricts traffic
#   SI-6  (Security Verification) — liveness/readiness probes
#   SC-28 (Protection at Rest) — IRSA for encrypted S3 access
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: securegenai-app
  namespace: securegenai
  labels:
    app: securegenai
spec:
  # Run 2 replicas for availability — if one pod crashes,
  # the other continues serving traffic while K8s restarts it.
  replicas: 2

  selector:
    matchLabels:
      app: securegenai

  # Rolling update strategy — replace pods one at a time.
  # maxUnavailable: 0 means "never have fewer than 2 pods running"
  # maxSurge: 1 means "create 1 new pod before killing an old one"
  # Result: during deploy, you briefly have 3 pods, then 2 again.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:
    metadata:
      labels:
        app: securegenai
      # Prometheus scrape annotations — tells Prometheus service discovery
      # to scrape this pod's /metrics endpoint on port 8000.
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      # ── Service Account (IRSA) ─────────────────────────────
      # This is how the pod gets AWS permissions.
      # Without this, boto3 has no credentials and all AWS calls fail.
      serviceAccountName: securegenai-app

      # ── Pod Security Context ───────────────────────────────
      # Applies to ALL containers in the pod.
      securityContext:
        # Run as the same non-root user defined in the Dockerfile
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        # Prevent running as root even if the image is misconfigured
        runAsNonRoot: true
        # seccomp profile restricts which Linux syscalls the pod can make
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: securegenai-app
          # IMAGE_TAG is replaced by Jenkins pipeline:
          # kubectl set image deployment/securegenai-app securegenai-app=NEW_IMAGE
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/securegenai-app:latest
          ports:
            - containerPort: 8000
              protocol: TCP

          # ── Container Security Context ───────────────────
          securityContext:
            # Prevent the container from gaining more privileges than its parent
            allowPrivilegeEscalation: false
            # Read-only root filesystem — the container can't write to its
            # own filesystem. If an attacker gets shell access, they can't
            # modify the app code, install tools, or create scripts.
            readOnlyRootFilesystem: true
            # Drop ALL Linux capabilities — the container has no special
            # kernel privileges (no cap_net_raw, no cap_sys_admin, etc.)
            capabilities:
              drop:
                - ALL

          # ── Environment Variables ────────────────────────
          # Non-sensitive config. Sensitive values come from K8s Secrets
          # (not shown here — in production, synced from AWS Secrets Manager).
          env:
            - name: SECUREGENAI_ENVIRONMENT
              value: "production"
            - name: SECUREGENAI_LOG_LEVEL
              value: "INFO"
            - name: SECUREGENAI_AWS_REGION
              value: "us-east-1"
            - name: SECUREGENAI_S3_BUCKET_NAME
              value: "securegenai-documents-prod"
            - name: SECUREGENAI_KMS_KEY_ID
              value: "alias/securegenai-document-key"
            - name: SECUREGENAI_BEDROCK_MODEL_ID
              value: "anthropic.claude-3-sonnet-20240229-v1:0"
            - name: SECUREGENAI_DYNAMODB_TABLE_NAME
              value: "securegenai-document-registry-prod"

          # ── Resource Limits ──────────────────────────────
          # Requests: guaranteed resources (K8s schedules based on this)
          # Limits: maximum resources (K8s kills the pod if exceeded)
          # Without limits, a single pod could consume all node resources
          # and starve other pods — denial of service from within.
          resources:
            requests:
              cpu: "250m"       # 0.25 CPU core guaranteed
              memory: "256Mi"   # 256MB RAM guaranteed
            limits:
              cpu: "1000m"      # Max 1 CPU core
              memory: "512Mi"   # Max 512MB — OOMKilled if exceeded

          # ── Health Probes ────────────────────────────────
          # Liveness: "Is the process alive?"
          # If this fails 3 times, K8s kills and restarts the pod.
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness: "Can it serve traffic?"
          # If this fails, K8s removes the pod from the Service's
          # endpoint list — no traffic routes to it until it recovers.
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # ── Volume Mounts ────────────────────────────────
          # The app needs a writable /tmp for Python temp files
          # since the root filesystem is read-only.
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp

      # ── Volumes ──────────────────────────────────────────
      volumes:
        - name: tmp-dir
          emptyDir:
            # tmpfs = in-memory filesystem — faster and disappears
            # when the pod dies (no data persists on disk)
            medium: Memory
            sizeLimit: "64Mi"

      # ── Scheduling ───────────────────────────────────────
      # Spread pods across different nodes for high availability.
      # If one node dies, the pod on the other node keeps serving.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: securegenai
