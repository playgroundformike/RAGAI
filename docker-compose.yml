# ============================================================
# SecureGenAI Document Assistant — Local Development Stack
# ============================================================
#
# What this does:
#   Spins up the full application stack locally without an AWS account.
#   LocalStack provides fake S3, KMS, and DynamoDB endpoints.
#
# Usage:
#   docker-compose up --build        (start everything)
#   docker-compose up --build -d     (start in background)
#   docker-compose down -v           (stop and remove volumes)
#   docker-compose logs -f app       (tail app logs)
#
# After startup:
#   API docs:     http://localhost:8000/docs
#   Health check: http://localhost:8000/health
#   LocalStack:   http://localhost:4566
#
# Why LocalStack?
#   Our app calls S3, KMS, and DynamoDB. Without real AWS credentials,
#   those calls fail. LocalStack intercepts AWS SDK calls and returns
#   realistic responses. This means:
#   - New developers can run the full stack in 60 seconds
#   - CI/CD integration tests don't need AWS credentials
#   - No risk of accidentally writing to production S3
# ============================================================

services:

  # ── Application ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: securegenai-app
    ports:
      - "8000:8000"
    environment:
      # Override production defaults for local dev
      SECUREGENAI_ENVIRONMENT: development
      SECUREGENAI_LOG_LEVEL: DEBUG
      SECUREGENAI_AWS_REGION: us-east-1
      SECUREGENAI_S3_BUCKET_NAME: securegenai-documents-dev
      SECUREGENAI_KMS_KEY_ID: alias/securegenai-document-key
      SECUREGENAI_DYNAMODB_TABLE_NAME: securegenai-document-registry-dev

      # Point AWS SDK at LocalStack instead of real AWS.
      # boto3 uses AWS_ENDPOINT_URL to override the default endpoint.
      # This is the ONLY change needed — the application code is identical
      # to what runs in production. It doesn't know it's talking to LocalStack.
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1

    depends_on:
      localstack-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Restart on failure — mimics K8s restart policy
    restart: unless-stopped
    networks:
      - securegenai-net

  # ── LocalStack (Mock AWS) ────────────────────────────────────
  localstack:
    image: localstack/localstack:3.8
    container_name: securegenai-localstack
    ports:
      - "4566:4566"           # LocalStack gateway (all AWS services)
    environment:
      # Only enable the services we actually use — faster startup
      SERVICES: s3,kms,dynamodb
      # DEBUG for troubleshooting; set to 0 in CI
      DEBUG: 0
      # Persist data across container restarts (optional for dev)
      PERSISTENCE: 1
    volumes:
      # LocalStack stores its state here
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - securegenai-net

  # ── LocalStack Init (Create AWS Resources) ──────────────────
  # This container runs ONCE at startup to create the S3 bucket,
  # KMS key, and DynamoDB table in LocalStack. It exits after setup.
  # Think of it as a lightweight version of what Terraform does in prod.
  localstack-init:
    image: amazon/aws-cli:2.22.4
    container_name: securegenai-init
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localstack:4566
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "========================================"
        echo "Initializing LocalStack AWS Resources"
        echo "========================================"

        echo "→ Creating KMS key..."
        KMS_KEY_ID=$$(aws kms create-key \
          --description "SecureGenAI document encryption key" \
          --query 'KeyMetadata.KeyId' \
          --output text)
        echo "  Key ID: $$KMS_KEY_ID"

        echo "→ Creating KMS alias..."
        aws kms create-alias \
          --alias-name alias/securegenai-document-key \
          --target-key-id $$KMS_KEY_ID

        echo "→ Creating S3 bucket..."
        aws s3 mb s3://securegenai-documents-dev

        echo "→ Enabling bucket encryption..."
        aws s3api put-bucket-encryption \
          --bucket securegenai-documents-dev \
          --server-side-encryption-configuration '{
            "Rules": [{
              "ApplyServerSideEncryptionByDefault": {
                "SSEAlgorithm": "aws:kms",
                "KMSMasterKeyID": "'$$KMS_KEY_ID'"
              },
              "BucketKeyEnabled": true
            }]
          }'

        echo "→ Blocking public access on bucket..."
        aws s3api put-public-access-block \
          --bucket securegenai-documents-dev \
          --public-access-block-configuration '{
            "BlockPublicAcls": true,
            "IgnorePublicAcls": true,
            "BlockPublicPolicy": true,
            "RestrictPublicBuckets": true
          }'

        echo "→ Creating DynamoDB table..."
        aws dynamodb create-table \
          --table-name securegenai-document-registry-dev \
          --attribute-definitions \
            AttributeName=document_id,AttributeType=S \
          --key-schema \
            AttributeName=document_id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST

        echo "========================================"
        echo "LocalStack initialization complete!"
        echo "========================================"
    networks:
      - securegenai-net

# ── Volumes ──────────────────────────────────────────────────
volumes:
  localstack-data:
    driver: local

# ── Network ──────────────────────────────────────────────────
# Custom bridge network so containers can reach each other by name.
# "localstack" in AWS_ENDPOINT_URL resolves because Docker DNS
# maps container names to IPs within the same network.
networks:
  securegenai-net:
    driver: bridge
