# ============================================================
# SI-2: Flaw Remediation — System Updates
# ============================================================
# Ensure all packages are up to date and automatic security
# updates are configured. Unpatched systems are the #1 attack
# vector in DoD environments.
# ============================================================

---
- name: "SI-2 | Update all packages to latest versions"
  ansible.builtin.dnf:
    name: "*"
    state: latest
    security: true
  register: update_result
  # In production AMI builds, this ensures the AMI ships fully patched.
  # On live nodes, this catches any patches released since the AMI was built.

- name: "SI-2 | Install dnf-automatic for unattended security updates"
  ansible.builtin.dnf:
    name: dnf-automatic
    state: present

- name: "SI-2 | Configure automatic security updates"
  ansible.builtin.lineinfile:
    path: /etc/dnf/automatic.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    # Only apply security updates automatically — not all updates.
    # Feature updates could break the node; security patches are critical.
    - { regexp: '^upgrade_type', line: 'upgrade_type = security' }
    - { regexp: '^apply_updates', line: 'apply_updates = yes' }

- name: "SI-2 | Enable automatic update timer"
  ansible.builtin.systemd:
    name: dnf-automatic.timer
    enabled: true
    state: started

- name: "SI-2 | Check if reboot is required after updates"
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required
  changed_when: false

- name: "SI-2 | Notify if reboot needed"
  ansible.builtin.debug:
    msg: "⚠️  Reboot required to apply kernel updates"
  when: reboot_required.stat.exists | default(false)
