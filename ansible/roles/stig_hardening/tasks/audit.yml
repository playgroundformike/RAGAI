# ============================================================
# AU-2/AU-3: Audit Events — auditd Configuration
# ============================================================
# auditd is the Linux kernel audit framework. It logs security-
# relevant events: who logged in, what files were accessed,
# what commands were run as root, etc.
#
# These logs feed into Splunk/CloudWatch for SIEM analysis.
# Without auditd, you have no forensic evidence after a breach.
# ============================================================

---
- name: "AU-2 | Install audit packages"
  ansible.builtin.dnf:
    name:
      - audit
      - audit-libs
    state: present

- name: "AU-3 | Configure auditd settings"
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    # Max log file size before rotation
    - { regexp: '^max_log_file\s*=', line: 'max_log_file = {{ stig_auditd_max_log_file }}' }
    # Number of rotated log files to keep
    - { regexp: '^num_logs\s*=', line: 'num_logs = {{ stig_auditd_num_logs }}' }
    # Action when disk space is low — email the admin
    - { regexp: '^space_left_action', line: 'space_left_action = {{ stig_auditd_space_left_action }}' }
    # Action when disk space is critically low — HALT the system.
    # Why halt? In DoD, if audit logs can't be written, the system
    # must stop. Operating without audit logging violates policy.
    - { regexp: '^admin_space_left_action', line: 'admin_space_left_action = {{ stig_auditd_admin_space_left_action }}' }
    # Log format — ENRICHED includes resolved usernames, not just UIDs
    - { regexp: '^log_format', line: 'log_format = ENRICHED' }
  notify: restart auditd

- name: "AU-2 | Deploy audit rules for security events"
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/stig.rules
    mode: '0640'
    owner: root
    group: root
    content: |
      # ── STIG Audit Rules ─────────────────────────────────
      # These rules log security-relevant events to the audit log.

      # Log all attempts to modify user/group files
      -w /etc/passwd -p wa -k identity
      -w /etc/group -p wa -k identity
      -w /etc/shadow -p wa -k identity
      -w /etc/gshadow -p wa -k identity

      # Log all attempts to modify sudo configuration
      -w /etc/sudoers -p wa -k privilege_escalation
      -w /etc/sudoers.d/ -p wa -k privilege_escalation

      # Log all attempts to modify SSH configuration
      -w /etc/ssh/sshd_config -p wa -k ssh_config

      # Log all attempts to modify audit configuration
      -w /etc/audit/ -p wa -k audit_config
      -w /etc/audit/auditd.conf -p wa -k audit_config

      # Log all attempts to modify system time (tampering indicator)
      -a always,exit -F arch=b64 -S adjtimex -S settimeofday -k time_change
      -a always,exit -F arch=b64 -S clock_settime -k time_change

      # Log all use of privileged commands (sudo, su, passwd)
      -a always,exit -F path=/usr/bin/sudo -F perm=x -F auid>=1000 -k privileged
      -a always,exit -F path=/usr/bin/su -F perm=x -F auid>=1000 -k privileged
      -a always,exit -F path=/usr/bin/passwd -F perm=x -F auid>=1000 -k privileged

      # Log all file deletions by non-root users
      -a always,exit -F arch=b64 -S unlink -S unlinkat -S rename -S renameat -F auid>=1000 -k delete

      # Log all kernel module loading (rootkit detection)
      -a always,exit -F arch=b64 -S init_module -S finit_module -k module_load
      -a always,exit -F arch=b64 -S delete_module -k module_unload

      # Make audit rules immutable — can't be changed without reboot.
      # This prevents an attacker from disabling audit logging.
      -e 2
  notify: restart auditd

- name: "AU-2 | Enable and start auditd"
  ansible.builtin.systemd:
    name: auditd
    enabled: true
    state: started
