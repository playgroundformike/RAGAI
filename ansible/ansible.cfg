# ============================================================
# Ansible Configuration
# ============================================================

[defaults]
# Inventory file location
inventory = inventory/hosts.ini

# Roles path
roles_path = roles

# Don't create .retry files on failure (clutter)
retry_files_enabled = false

# Use YAML callback for cleaner output
stdout_callback = yaml

# Gather facts in parallel for faster execution
forks = 10

# SSH timeout
timeout = 30

# Don't prompt to add unknown hosts to known_hosts
# In EKS, node IPs change frequently — prompting breaks automation
host_key_checking = false

[privilege_escalation]
# Default to using sudo for all tasks
become = true
become_method = sudo
become_user = root
become_ask_pass = false
