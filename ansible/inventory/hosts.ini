# ============================================================
# Ansible Inventory — EKS Worker Nodes
# ============================================================
#
# In practice, EKS worker node IPs are dynamic (Auto Scaling Group).
# You would use one of these approaches:
#
# 1. AWS dynamic inventory plugin (recommended):
#    Uses aws_ec2 plugin to discover nodes by tags automatically.
#    ansible-playbook -i aws_ec2.yml site.yml
#
# 2. Packer build (preferred for EKS):
#    Run Ansible during AMI build, not against live nodes.
#    Packer spins up a temp EC2 instance, runs this playbook,
#    creates an AMI, and terminates the instance.
#    The AMI is then used in the EKS node group launch template.
#
# 3. Static inventory (this file):
#    For testing or small environments where IPs are known.
# ============================================================

[eks_workers]
# Replace with actual node IPs or use dynamic inventory
# node-1 ansible_host=10.0.1.10
# node-2 ansible_host=10.0.1.11

[eks_workers:vars]
ansible_user=ec2-user
ansible_ssh_private_key_file=~/.ssh/eks-nodes.pem
ansible_python_interpreter=/usr/bin/python3
